<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Stock Quant">
    <meta name="theme-color" content="#1f77b4">
    <title>股票量化分析</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1f77b4;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.4s;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        #splash.hide { opacity: 0; pointer-events: none; }
        #splash .icon { font-size: 64px; margin-bottom: 16px; }
        #splash .title { color: #fff; font-size: 24px; font-weight: 700; }
        #splash .sub { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 8px; }
        #splash .loader { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <div id="splash">
        <div class="icon">📈</div>
        <div class="title">股票量化分析</div>
        <div class="sub">加载中...</div>
        <div class="loader"></div>
    </div>
    <iframe id="app" src="https://stock-quant-thcxmf4zbi5wb3tqmpfzto.streamlit.app/?embed=true" allow="clipboard-write"></iframe>
    <script>
        // 隐藏启动屏
        const app = document.getElementById('app');
        const splash = document.getElementById('splash');
        app.onload = () => setTimeout(() => splash.classList.add('hide'), 600);

        // 超时兜底
        setTimeout(() => splash.classList.add('hide'), 5000);

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
